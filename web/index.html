<!DOCTYPE html>
<html>
<head>
  <title>Esame Patente</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e6e6e6;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: #2f5fa7;
      color: white;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      margin-bottom: 10px;
      text-align: center;
    }

    .timer {
      font-size: 28px;
      margin-top: 10px;
    }

    /* MAIN */
    .main {
      flex: 1;
      background: #f2f2f2;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .top {
      display: flex;
      justify-content: space-between;
    }

    .question {
      margin-top: 30px;
      font-size: 20px;
    }

    .image {
      margin: 20px 0;
      text-align: center;
    }

    .answers {
      margin-top: 30px;
      text-align: center;
    }

    .btn {
      font-size: 30px;
      padding: 20px 40px;
      margin: 10px;
      border: 3px solid #2f5fa7;
      background: white;
      cursor: pointer;
    }

    /* FOOTER */
    .footer {
      margin-top: auto;
      background: #2f5fa7;
      padding: 10px;
      color: white;
      text-align: center;
    }

    .nav-btn {
      margin: 3px;
      padding: 5px 10px;
      background: white;
      border: none;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="app"></div>

<script src="app.js"></script>

</body>
</html>
