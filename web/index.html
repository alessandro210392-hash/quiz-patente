<!DOCTYPE html>
<html>
<head>
  <title>Esame Patente</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #d9d9d9;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: linear-gradient(#4a7bd1, #2f5fa7);
      color: white;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 10px;
      margin-bottom: 10px;
      text-align: center;
      border-radius: 5px;
    }

    .timer {
      font-size: 30px;
      margin-top: 10px;
    }

    /* MAIN */
    .main {
      flex: 1;
      background: #efefef;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }

    .question {
      margin-top: 40px;
      font-size: 22px;
      text-align: center;
    }

    .image {
      margin: 20px;
      text-align: center;
    }

    .answers {
      margin-top: 30px;
      text-align: center;
    }

    .btn {
      font-size: 40px;
      padding: 25px 50px;
      margin: 20px;
      border: 4px solid #2f5fa7;
      background: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #2f5fa7;
      color: white;
    }

    /* FOOTER */
    .footer {
      margin-top: auto;
      background: #2f5fa7;
      padding: 10px;
      text-align: center;
    }

    .nav-btn {
      margin: 2px;
      padding: 6px 10px;
      background: #ddd;
      border: none;
      cursor: pointer;
    }

    .nav-btn.active {
      background: #2f5fa7;
      color: white;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script src="app.js"></script>

</body>
</html>
